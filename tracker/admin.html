<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — CharterTrack</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%232a78d6'/%3E%3Cpath d='M25 55l16 16 34-38' stroke='white' stroke-width='12' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme:light;
  --page:#f9f9f7; --surface:#fcfcfb; --ink:#0b0b0b; --ink-2:#52514e; --ink-3:#6e6c66;
  --hairline:#e1e0d9; --ring:rgba(11,11,11,.10); --track:#eeede8;
  --good:#0b7a0b; --good-ink:#006300; --accent:#256abf; --danger:#c23a39;
  --c1:#2a78d6; --c2:#1baf7a; --c3:#eda100; --c4:#008300; --c5:#4a3aa7; --c6:#e34948; --c7:#e87ba4; --c8:#eb6834;
  --shadow:0 1px 2px rgba(11,11,11,.04), 0 8px 24px -12px rgba(11,11,11,.12);
}
@media (prefers-color-scheme: dark){
  :root{
    color-scheme:dark;
    --page:#0d0d0d; --surface:#1a1a19; --ink:#fff; --ink-2:#c3c2b7; --ink-3:#898781;
    --hairline:#2c2c2a; --ring:rgba(255,255,255,.10); --track:#262624;
    --good:#0c6b0c; --good-ink:#3fbf3f; --accent:#3987e5; --danger:#e66767;
    --c1:#3987e5; --c2:#199e70; --c3:#c98500; --c4:#008300; --c5:#9085e9; --c6:#e66767; --c7:#d55181; --c8:#d95926;
    --shadow:none;
  }
}
*{box-sizing:border-box}
body{margin:0;font-family:'Poppins',system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--page);color:var(--ink);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:var(--accent)}
.wrap{max-width:1060px;margin:0 auto;padding:0 20px}
header.top{position:sticky;top:0;z-index:20;background:color-mix(in srgb, var(--page) 88%, transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--hairline)}
.top-row{display:flex;align-items:center;gap:10px;padding:12px 0;flex-wrap:wrap}
.mark{width:28px;height:28px;border-radius:8px;background:var(--accent);display:grid;place-items:center;flex:none}
.mark svg{width:16px;height:16px}
.brand{font-weight:700;font-size:17px;letter-spacing:-.01em;color:inherit;text-decoration:none}
.badge{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);border:1px solid currentColor;border-radius:20px;padding:1px 8px}
.top-row .right{margin-left:auto;display:flex;align-items:center;gap:14px}
.top-row .site-link{font-size:13px;color:var(--ink-2);text-decoration:none;background:none;border:none;cursor:pointer;font-family:inherit;padding:0}
.top-row .site-link:hover{color:var(--ink)}
h1{font-size:clamp(22px,4vw,30px);letter-spacing:-.02em;margin:34px 0 4px}
.sub{color:var(--ink-2);margin:0 0 24px;font-size:14px}
.sec-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-3);margin:26px 0 12px}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
.tile{background:var(--surface);border:1px solid var(--ring);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow)}
.tile .k{font-size:12px;color:var(--ink-2);font-weight:500}
.tile .v{font-size:26px;font-weight:700;letter-spacing:-.02em;margin-top:2px}
.tile .v small{font-size:13px;font-weight:500;color:var(--ink-3)}
.panel{background:var(--surface);border:1px solid var(--ring);border-radius:16px;box-shadow:var(--shadow);padding:16px 18px;margin-bottom:18px}
.qrow{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--hairline);font-size:13.5px}
.qrow:first-child{border-top:none}
.qrow .nm{width:120px;flex:none;font-weight:500;display:flex;align-items:center;gap:8px}
.dot{width:9px;height:9px;border-radius:50%;flex:none}
.qrow .bar{flex:1;height:8px;border-radius:4px;background:var(--track);overflow:hidden}
.qrow .bar i{display:block;height:100%;border-radius:4px}
.qrow .ct{width:110px;flex:none;text-align:right;font-size:12.5px;color:var(--ink-2)}
.tblwrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:760px}
th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--hairline);white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid var(--hairline);vertical-align:middle}
tr:last-child td{border-bottom:none}
td .nm{font-weight:600}
td .em{font-size:12px;color:var(--ink-3)}
.pill{font-size:11px;font-weight:600;border-radius:20px;padding:2px 10px;display:inline-block}
.pill.admin{background:var(--accent);color:#fff}
.pill.student{background:var(--track);color:var(--ink-2)}
select{font:inherit;font-size:12.5px;padding:5px 8px;border:1px solid var(--hairline);border-radius:8px;background:var(--surface);color:var(--ink)}
.mini{font:inherit;font-size:12px;font-weight:500;padding:5px 12px;border-radius:8px;border:1px solid var(--hairline);background:var(--surface);color:var(--ink);cursor:pointer}
.mini:hover{border-color:var(--ink-3)}
.mini.danger{color:var(--danger)}
.mini.danger:hover{border-color:var(--danger)}
.qtags{display:flex;gap:4px;flex-wrap:wrap}
.qtag{font-size:10.5px;font-weight:600;border-radius:6px;padding:1px 6px;color:#fff}
.muted{color:var(--ink-3)}
.center{text-align:center;padding:60px 20px;color:var(--ink-2)}
.center .card{display:inline-block;background:var(--surface);border:1px solid var(--ring);border-radius:16px;box-shadow:var(--shadow);padding:30px 36px}
.center h2{margin:0 0 8px}
.btn{display:inline-block;font:inherit;font-size:13px;font-weight:600;padding:10px 20px;border-radius:10px;border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;text-decoration:none;margin-top:14px}
#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--page);font-size:13px;font-weight:500;padding:9px 18px;border-radius:22px;transition:transform .25s ease;z-index:50;pointer-events:none;max-width:88vw}
#toast.show{transform:translateX(-50%) translateY(0)}
.hidden{display:none !important}
.foot{border-top:1px solid var(--hairline);margin-top:32px;padding:20px 0 40px;font-size:12.5px;color:var(--ink-3)}
</style>
</head>
<body>

<header class="top">
  <div class="wrap top-row">
    <span class="mark" aria-hidden="true"><svg viewBox="0 0 100 100"><path d="M25 55l16 16 34-38" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
    <a class="brand" href="./">CharterTrack</a><span class="badge">Admin</span>
    <span class="right">
      <a class="site-link" href="./">&larr; Tracker</a>
      <span class="site-link" id="whoami" style="cursor:default"></span>
      <button class="site-link" id="signoutBtn">Sign out</button>
    </span>
  </div>
</header>

<div class="wrap" id="app">
  <div class="center" id="loading"><p>Checking access&hellip;</p></div>
</div>

<div id="toast" role="status"></div>

<script>
'use strict';
const $=s=>document.querySelector(s);
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2600)}
async function api(path,opts={}){
  const r=await fetch(path,{credentials:'same-origin',headers:{'Content-Type':'application/json'},...opts});
  const j=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(j.error||('HTTP '+r.status));
  return j;
}

/* qualification meta (display names + total papers required, matches tracker data) */
const QMETA={
  acca:{n:'ACCA',c:'--c1',req:13}, cpaau:{n:'CPA Australia',c:'--c2',req:6}, uaeca:{n:'UAE CA',c:'--c3',req:3},
  uscpa:{n:'US CPA',c:'--c4',req:4}, cma:{n:'CMA (US)',c:'--c5',req:2}, cgma:{n:'CIMA / CGMA',c:'--c6',req:12},
  aca:{n:'ACA',c:'--c7',req:15}, caindia:{n:'CA (India)',c:'--c8',req:20}
};
const qn=id=>(QMETA[id]&&QMETA[id].n)||id;
const qc=id=>(QMETA[id]&&QMETA[id].c)||'--accent';

let me=null,users=[];

function fmtDate(ts){return ts?new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'—'}
function ago(ts){
  if(!ts)return '—';
  const d=Date.now()-ts;
  if(d<3600e3)return Math.max(1,Math.round(d/60e3))+' min ago';
  if(d<86400e3)return Math.round(d/3600e3)+' h ago';
  return Math.round(d/86400e3)+' d ago';
}
function pctOf(u){
  if(!u.summary||!u.summary.quals.length)return null;
  let req=0,done=0;
  u.summary.quals.forEach(q=>{
    const meta=QMETA[q];if(!meta)return;
    const p=u.summary.perQual[q]||{passed:0,exempt:0};
    req+=meta.req;done+=Math.min(p.passed+p.exempt,meta.req);
  });
  return req?Math.round(done/req*100):0;
}

function denied(msg,showLogin){
  $('#app').innerHTML=`<div class="center"><div class="card"><h2>${esc(msg)}</h2>
    <p class="muted">This area is for CharterTrack administrators only.</p>
    ${showLogin?'<a class="btn" href="login.html?next=admin">Sign in</a>':'<a class="btn" href="./">Back to tracker</a>'}</div></div>`;
}

function render(){
  const week=Date.now()-7*86400e3;
  const students=users.filter(u=>u.role==='student');
  const withPlan=users.filter(u=>u.summary&&u.summary.quals.length);
  const newWeek=users.filter(u=>u.createdAt&&u.createdAt>week).length;
  const activeWeek=users.filter(u=>u.summary&&u.summary.updatedAt>week).length;
  let passed=0,booked=0,exempt=0;
  const adoption={};
  withPlan.forEach(u=>{
    u.summary.quals.forEach(q=>{adoption[q]=(adoption[q]||0)+1});
    Object.values(u.summary.perQual).forEach(p=>{passed+=p.passed;booked+=p.booked;exempt+=p.exempt});
  });
  const pcts=withPlan.map(pctOf).filter(x=>x!=null);
  const avgPct=pcts.length?Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length):0;
  const maxAdopt=Math.max(1,...Object.values(adoption));

  $('#app').innerHTML=`
  <h1>Student reports</h1>
  <p class="sub">Live data from every CharterTrack account &middot; refreshed when you reload.</p>

  <div class="tiles">
    <div class="tile"><div class="k">Registered users</div><div class="v">${users.length}<small> &middot; ${students.length} students</small></div></div>
    <div class="tile"><div class="k">New this week</div><div class="v">${newWeek}</div></div>
    <div class="tile"><div class="k">Active this week</div><div class="v">${activeWeek}</div></div>
    <div class="tile"><div class="k">Average completion</div><div class="v">${avgPct}%<small> &middot; of tracked plans</small></div></div>
    <div class="tile"><div class="k">Papers passed</div><div class="v">${passed}<small> &middot; ${booked} booked &middot; ${exempt} exempt</small></div></div>
  </div>

  <h2 class="sec-title">Qualification adoption</h2>
  <div class="panel">
    ${Object.keys(adoption).length?Object.entries(adoption).sort((a,b)=>b[1]-a[1]).map(([q,n])=>`
      <div class="qrow">
        <span class="nm"><span class="dot" style="background:var(${qc(q)})"></span>${esc(qn(q))}</span>
        <span class="bar"><i style="width:${Math.round(n/maxAdopt*100)}%;background:var(${qc(q)})"></i></span>
        <span class="ct">${n} student${n===1?'':'s'}</span>
      </div>`).join(''):'<p class="muted" style="margin:6px 0">No students have added a qualification yet.</p>'}
  </div>

  <h2 class="sec-title">Users &amp; access control</h2>
  <div class="panel tblwrap">
    <table>
      <thead><tr><th>User</th><th>Role</th><th>Qualifications</th><th>Progress</th><th>Passed</th><th>Signed up</th><th>Last active</th><th>Actions</th></tr></thead>
      <tbody>
      ${users.map(u=>{
        const pct=pctOf(u);
        const totals=u.summary?Object.values(u.summary.perQual).reduce((a,p)=>({p:a.p+p.passed,b:a.b+p.booked}),{p:0,b:0}):{p:0,b:0};
        return `<tr>
          <td><div class="nm">${esc(u.name)}${u.email===me.email?' <span class="muted">(you)</span>':''}</div><div class="em">${esc(u.email)}</div></td>
          <td><span class="pill ${u.role}">${u.role}</span>${u.envAdmin?'<div class="em">permanent</div>':''}</td>
          <td>${u.summary&&u.summary.quals.length?`<div class="qtags">${u.summary.quals.map(q=>`<span class="qtag" style="background:var(${qc(q)})">${esc(qn(q))}</span>`).join('')}</div>`:'<span class="muted">—</span>'}</td>
          <td>${pct==null?'<span class="muted">—</span>':pct+'%'}</td>
          <td>${totals.p}${totals.b?` <span class="muted">+${totals.b} booked</span>`:''}</td>
          <td>${fmtDate(u.createdAt)}</td>
          <td>${ago(u.summary&&u.summary.updatedAt)}</td>
          <td style="white-space:nowrap">
            ${u.envAdmin?'<span class="muted">locked</span>':`
            <select data-role="${esc(u.email)}" aria-label="Role for ${esc(u.email)}" ${u.email===me.email?'disabled':''}>
              <option value="student" ${u.role==='student'?'selected':''}>student</option>
              <option value="admin" ${u.role==='admin'?'selected':''}>admin</option>
            </select>
            ${u.email===me.email?'':`<button class="mini danger" data-del="${esc(u.email)}">Delete</button>`}`}
          </td>
        </tr>`;
      }).join('')||'<tr><td colspan="8" class="muted">No users yet.</td></tr>'}
      </tbody>
    </table>
  </div>

  <footer class="foot">Role changes apply immediately. Permanent admins are set with the <code>ADMIN_EMAILS</code> environment variable in Vercel and cannot be changed or deleted here.</footer>`;

  document.querySelectorAll('select[data-role]').forEach(sel=>{
    sel.addEventListener('change',async()=>{
      const email=sel.dataset.role,role=sel.value;
      try{
        await api('/api/admin',{method:'POST',body:JSON.stringify({action:'setRole',email,role})});
        const u=users.find(x=>x.email===email);if(u)u.role=role;
        toast(email+' is now '+role);render();
      }catch(e){toast(e.message);render()}
    });
  });
  document.querySelectorAll('button[data-del]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const email=btn.dataset.del;
      if(!confirm('Delete '+email+' and all their progress? This cannot be undone.'))return;
      try{
        await api('/api/admin',{method:'POST',body:JSON.stringify({action:'deleteUser',email})});
        users=users.filter(x=>x.email!==email);
        toast('Deleted '+email);render();
      }catch(e){toast(e.message)}
    });
  });
}

$('#signoutBtn').addEventListener('click',async()=>{
  try{await api('/api/auth',{method:'POST',body:JSON.stringify({action:'logout'})})}catch(e){}
  location.href='login.html';
});

(async function init(){
  try{
    const j=await api('/api/auth?action=me');
    me=j.user;
    if(!me)return denied('Sign in required',true);
    $('#whoami').textContent=me.name||me.email;
    if(me.role!=='admin')return denied('Access denied',false);
    const rep=await api('/api/admin?action=report');
    users=(rep.users||[]).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
    render();
  }catch(e){
    $('#app').innerHTML=`<div class="center"><div class="card"><h2>Could not load reports</h2><p class="muted">${esc(e.message)}</p><a class="btn" href="admin.html">Retry</a></div></div>`;
  }
})();
</script>
</body>
</html>
