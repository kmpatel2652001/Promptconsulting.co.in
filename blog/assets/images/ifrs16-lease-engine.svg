<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">IFRS 16 lease calculator illustration</title>
  <desc id="desc">An office tower beside a lease amortisation schedule and journal entries, representing IFRS 16 lease accounting.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5fff9"/>
      <stop offset="100%" stop-color="#dff9ef"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#009b68"/>
      <stop offset="100%" stop-color="#41d49f"/>
    </linearGradient>
    <linearGradient id="soft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8fe7c0"/>
      <stop offset="100%" stop-color="#c3f5de"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- office tower -->
  <rect x="120" y="180" width="240" height="440" rx="14" fill="url(#accent)"/>
  <rect x="150" y="220" width="44" height="44" rx="6" fill="#eafff5" opacity="0.9"/>
  <rect x="218" y="220" width="44" height="44" rx="6" fill="#eafff5" opacity="0.7"/>
  <rect x="286" y="220" width="44" height="44" rx="6" fill="#eafff5" opacity="0.9"/>
  <rect x="150" y="292" width="44" height="44" rx="6" fill="#eafff5" opacity="0.7"/>
  <rect x="218" y="292" width="44" height="44" rx="6" fill="#eafff5" opacity="0.9"/>
  <rect x="286" y="292" width="44" height="44" rx="6" fill="#eafff5" opacity="0.7"/>
  <rect x="150" y="364" width="44" height="44" rx="6" fill="#eafff5" opacity="0.9"/>
  <rect x="218" y="364" width="44" height="44" rx="6" fill="#eafff5" opacity="0.7"/>
  <rect x="286" y="364" width="44" height="44" rx="6" fill="#eafff5" opacity="0.9"/>
  <rect x="150" y="436" width="44" height="44" rx="6" fill="#eafff5" opacity="0.7"/>
  <rect x="218" y="436" width="44" height="44" rx="6" fill="#eafff5" opacity="0.9"/>
  <rect x="286" y="436" width="44" height="44" rx="6" fill="#eafff5" opacity="0.7"/>
  <rect x="200" y="520" width="80" height="100" rx="8" fill="#0b3f2c"/>
  <rect x="90" y="612" width="300" height="16" rx="8" fill="#0b3f2c" opacity="0.25"/>

  <!-- schedule card -->
  <rect x="460" y="150" width="620" height="360" rx="18" fill="#ffffff" stroke="#bfe9d6" stroke-width="3"/>
  <rect x="460" y="150" width="620" height="64" rx="18" fill="url(#soft)"/>
  <rect x="492" y="174" width="220" height="18" rx="9" fill="#0b3f2c" opacity="0.75"/>
  <!-- declining liability bars -->
  <rect x="510" y="420" width="52" height="-0" fill="none"/>
  <rect x="510" y="252" width="52" height="210" rx="6" fill="url(#accent)"/>
  <rect x="586" y="282" width="52" height="180" rx="6" fill="url(#accent)" opacity="0.9"/>
  <rect x="662" y="312" width="52" height="150" rx="6" fill="url(#accent)" opacity="0.8"/>
  <rect x="738" y="342" width="52" height="120" rx="6" fill="url(#accent)" opacity="0.7"/>
  <rect x="814" y="372" width="52" height="90" rx="6" fill="url(#accent)" opacity="0.6"/>
  <rect x="890" y="402" width="52" height="60" rx="6" fill="url(#accent)" opacity="0.5"/>
  <rect x="966" y="432" width="52" height="30" rx="6" fill="url(#accent)" opacity="0.4"/>
  <line x1="496" y1="462" x2="1044" y2="462" stroke="#bfe9d6" stroke-width="3"/>

  <!-- journal entry slip -->
  <rect x="560" y="540" width="440" height="150" rx="14" fill="#ffffff" stroke="#bfe9d6" stroke-width="3"/>
  <rect x="588" y="568" width="180" height="14" rx="7" fill="#009b68"/>
  <rect x="588" y="600" width="260" height="12" rx="6" fill="#8fe7c0"/>
  <rect x="588" y="628" width="230" height="12" rx="6" fill="#c3f5de"/>
  <rect x="588" y="656" width="250" height="12" rx="6" fill="#8fe7c0"/>
  <rect x="900" y="596" width="70" height="12" rx="6" fill="#0b3f2c" opacity="0.55"/>
  <rect x="900" y="624" width="70" height="12" rx="6" fill="#0b3f2c" opacity="0.35"/>
  <rect x="900" y="652" width="70" height="12" rx="6" fill="#0b3f2c" opacity="0.55"/>

  <!-- percent badge -->
  <circle cx="1060" cy="120" r="56" fill="url(#accent)"/>
  <text x="1060" y="134" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#eafff5" text-anchor="middle">%</text>
</svg>
